<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informacion Personal</title>
    <link rel="stylesheet" type="text/css" href="../static/CSS/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous">
</head>

<body>
    <header>
        <div class="container__menu">
            <div class="menu">
                <nav>
                    <ul>
                        <li><a href="#" id="selected">Inicio</a></li>
                        <li><a href="#">Servicios</a>
                            <ul>
                                <li><a href="{{ url_for('perfil_instructor') }}">Perfil</a></li>
                                <li><a href="{{ url_for('planes_trabajo_ins') }}">Asignar Plan de Trabajo</a></li>
                            </ul>
                        </li>
                        <li><a href="#">Nosotros</a></li>
                        <li><a href="#">Contactos</a></li>
                        <li class="admin">
                            <h6>María</h6>
                        </li>
                        <li class="user"><img src="../static/img/ic_person.png" alt=""></li>
                        <li><a href="{{ url_for('login') }}"></a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main id="tabla">
        <div class="content-container">
            <div class="col-md-5">
                <form method="POST">
                    <fieldset>
                        <legend class="fw-bold">Información Personal</legend>
                        <hr>
                        <div class="form-group"></div>
                        <label for="nombre">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" required class="form-control">

                        <label for="apellido">Apellido:</label>
                        <input type="text" id="apellido" name="apellido" required class="form-control">

                        <label for="edad">Edad:</label>
                        <input type="number" id="edad" name="edad" required class="form-control">

                        <label for="correo">Correo:</label>
                        <input type="text" id="correo" name="correo" required class="form-control">

                        <br>
                        <button type="submit" class="btn btn-primary btn-block">Guardar Cambios</button>
                        <a href="{{ url_for('perfil_instructor') }}" class="btn btn-primary btn-block">Volver</a>
                </form>
            </div>
        </div>
    </main>

</body>

</html>
